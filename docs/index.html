<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foodlogistic</title>
    <style>
        :root {
            --color-primary: #00eaff;
            --color-secondary: #0ef6a7;
            --color-light: #0a0f1f;
            --color-dark: #e6f1ff;
            --font-main: "Segoe UI", Arial, sans-serif;
        }

        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:var(--font-main);
            background:var(--color-light);
            color:var(--color-dark);
        }

        header{
            background:#05070d;
            color:white;
            padding:1.5rem;
            border-bottom:2px solid var(--color-primary);
        }

        nav ul{list-style:none;display:flex;gap:1.5rem;}
        nav a{color:var(--color-primary);text-decoration:none;font-weight:600;}
        nav a:hover{color:var(--color-secondary);}

        .hero{
            background:linear-gradient(135deg, #00111f, #002b3d);
            color:white;
            padding:6rem 2rem;
            text-align:center;
        }

        main{padding:2rem;}
        section{margin-bottom:4rem;}
        h2{color:var(--color-secondary);}

        .services-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}

        .service-card{
            background:#0d152b;
            padding:1.5rem;
            border-radius:8px;
            border:1px solid var(--color-primary);
            transition:.3s;
        }
        .service-card:hover{
            transform:translateY(-5px);
            border-color:var(--color-secondary);
        }

        form{
            background:#0d152b;
            padding:2rem;
            border-radius:8px;
            border:1px solid var(--color-primary);
            max-width:600px;
        }

        label{display:block;margin-top:1rem;font-weight:600;color:var(--color-primary);}

        input,textarea{
            width:100%;
            padding:.8rem;
            margin-top:.3rem;
            border:1px solid rgba(0,234,255,.2);
            border-radius:6px;
            font-size:1rem;
            font-family:inherit;
            background:#0a1224;
            color:var(--color-dark);
        }

        input:focus,textarea:focus{
            outline:none;
            border-color:var(--color-primary);
            box-shadow:0 0 8px rgba(0,234,255,.2);
        }

        button[type="submit"]{
            margin-top:1.5rem;
            padding:.8rem 1.5rem;
            background:var(--color-primary);
            color:#05070d;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:1rem;
            font-weight:600;
            transition:.2s;
        }

        button[type="submit"]:hover{
            background:var(--color-secondary);
            box-shadow:0 0 10px rgba(14,246,167,.4);
        }

        /* CONSENTIMENTS */
        .form-consents{margin-top:1.2rem;display:flex;flex-direction:column;gap:10px;}

        .ci{display:flex;align-items:flex-start;gap:9px;cursor:pointer;}

        .ci input[type="checkbox"]{
            appearance:none;
            width:16px;height:16px;
            border:1.5px solid rgba(0,234,255,.4);
            border-radius:4px;
            background:#0a1224;
        }

        .ci input[type="checkbox"]:checked{
            background:var(--color-primary);
        }

        .ci input[type="checkbox"]:checked::after{
            content:'';
            position:absolute;
            width:7px;height:4px;
            border-left:2px solid #05070d;
            border-bottom:2px solid #05070d;
            transform:rotate(-45deg);
        }

        .cl{font-size:.82rem;color:rgba(230,241,255,.7);}
        .cl a{color:var(--color-secondary);}

        .rs{color:#ff4e6a;}
        .ce{color:#ff4e6a;font-size:.78rem;margin-left:25px;}

        /* COOKIES */
        #ck-banner{
            position:fixed;bottom:0;left:0;right:0;
            background:#05070d;
            border-top:2px solid var(--color-primary);
            padding:1rem;
            display:flex;justify-content:space-between;
            transform:translateY(100%);
            transition:.4s;
        }

        #ck-banner.visible{transform:translateY(0);}

        .ckt p{font-size:.85rem;color:rgba(230,241,255,.7);}
        .ckt a{color:var(--color-secondary);}

        .cka{display:flex;gap:.5rem;}

        .ckb{padding:.4rem .8rem;border-radius:6px;cursor:pointer;}

        .ckac{background:var(--color-primary);color:#05070d;}
        .ckrj{background:none;color:#ccc;border:1px solid #555;}
        .ckcf{background:none;color:var(--color-secondary);border:1px solid var(--color-secondary);}

        footer{
            background:#05070d;
            color:white;
            text-align:center;
            padding:1.5rem;
            border-top:2px solid var(--color-primary);
        }

        .footer-legal a{
            color:var(--color-secondary);
            margin:0 10px;
        }

        @media(min-width:768px){
            .services-grid{grid-template-columns:repeat(3,1fr);}
        }
    </style>
</head>
<body>

<div id="ck-banner">
  <div class="ckt">
    <p>🍪 Utilitzem cookies. Consulta la <a href="#">Política</a>.</p>
  </div>
  <div class="cka">
    <button class="ckb ckrj" onclick="ckChoice('reject')">Rebutjar</button>
    <button class="ckb ckac" onclick="ckChoice('accept')">Acceptar</button>
  </div>
</div>

<header>
    <h1>foodlogistic</h1>
</header>

<section class="hero">
    <h2>Distribució logística moderna</h2>
</section>

<main>
    <section>
        <h2>Serveis</h2>
        <div class="services-grid">
            <div class="service-card">Distribució</div>
            <div class="service-card">Logística</div>
            <div class="service-card">Cadena de fred</div>
        </div>
    </section>

    <section>
        <h2>Contacte</h2>
        <form>
            <label>Nom</label>
            <input type="text">
            <label>Email</label>
            <input type="email">
            <textarea></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>
</main>

<footer>
    © 2026 foodlogistic
</footer>

<script>
(function(){
    const b=document.getElementById('ck-banner');
    setTimeout(()=>b.classList.add('visible'),800);
    window.ckChoice=function(){
        b.style.display='none';
    };
})();
</script>

</body>
</html>
